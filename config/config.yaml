app:
  env: "development"
  name: "boilerplate-golang"

server:
  host: "0.0.0.0"
  port: 8080
  timeout_seconds: 30

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "password"
  dbname: "boilerplate_db"
  ssl_mode: "disable"
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime_minutes: 30

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

kafka:
  brokers:
    - "localhost:9092"
  client_id: "boilerplate-golang-client"
  group_id: "boilerplate-golang-group"
